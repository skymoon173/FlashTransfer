<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a1220">
  <title>闪传 · 局域网文件传输</title>
  <link rel="stylesheet" href="static/app.css">
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>
  <main>
    <header class="topbar">
      <a class="brand" href="./" aria-label="闪传首页">
        <span class="brand-mark">S</span>
        <span><strong>闪传</strong><small>LOCAL DROP</small></span>
      </a>
      <div class="connection"><span></span>设备已连接</div>
    </header>

    <section class="hero">
      <div>
        <p class="kicker">DEVICE ↔ DEVICE</p>
        <h1>把文件放下，<br><em>它就过去了。</em></h1>
        <p class="hero-copy">无需数据线、无需云盘。文件只在当前 Wi-Fi 或手机热点中传输。</p>
      </div>
      <div class="hero-stat">
        <span id="heroFileCount">0</span>
        <small>已共享文件</small>
      </div>
    </section>

    <section class="drop-card" id="dropZone">
      <input id="fileInput" type="file" multiple>
      <input id="folderInput" type="file" webkitdirectory directory multiple>
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V4m0 0L7.5 8.5M12 4l4.5 4.5M5 14v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"/></svg>
      </div>
      <h2>发送到这台设备</h2>
      <p>拖放到这里，或从设备中选择</p>
      <div class="upload-buttons">
        <button id="chooseFiles" class="primary">选择文件</button>
        <button id="chooseFolder" class="secondary">选择文件夹</button>
      </div>
      <p class="support-note">文件夹选择建议使用 Chrome、Edge 或安卓浏览器</p>
    </section>

    <section id="transferPanel" class="transfer-panel" hidden>
      <div class="transfer-heading">
        <div>
          <p class="section-label">正在传输</p>
          <h2 id="transferTitle">准备文件...</h2>
        </div>
        <strong id="overallPercent">0%</strong>
      </div>
      <div class="overall-track"><div id="overallBar"></div></div>
      <div class="transfer-meta">
        <span id="transferDetail">正在读取文件夹</span>
        <span id="transferSize">0 B / 0 B</span>
      </div>
      <div id="queue" class="queue"></div>
    </section>

    <section class="library">
      <div class="section-heading">
        <div>
          <p class="section-label">共享空间</p>
          <h2>收到的文件</h2>
        </div>
        <button id="refresh" class="refresh">刷新</button>
      </div>
      <div id="fileList" class="file-list"></div>
      <div id="empty" class="empty" hidden>
        <div class="empty-orbit">＋</div>
        <h3>这里还很安静</h3>
        <p>从手机或电脑发送第一个文件</p>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>
  <script src="static/app.js"></script>
</body>
</html>
